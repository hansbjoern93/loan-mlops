services:
  loan-mlops:
    build: .
    container_name: loan-mlops
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "python -m ipykernel install --user --name loan-mlops --display-name 'Python (loan-mlops)' &&
             jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root"